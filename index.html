<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zayoma E-learning - Karibu</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome kwa ajili ya icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #ffffff; /* Rangi nyeupe kama kwenye video */
            margin: 0;
            overflow: hidden; /* Kuzuia scrolling wakati wa intro */
        }

        /* =========================================
           ANIMATIONS (MIONDOKO) YA INTRO
           ========================================= */
        
        /* 1. Logo kutokea na kusogea */
        @keyframes logoReveal {
            0% { transform: scale(0.3) translateY(50px); opacity: 0; filter: blur(10px); }
            60% { transform: scale(1.05) translateY(-10px); opacity: 1; filter: blur(0); }
            100% { transform: scale(1) translateY(0); opacity: 1; filter: blur(0); }
        }

        /* 2. Maandishi kupanda juu na kutokea */
        @keyframes textReveal {
            0% { transform: translateY(30px); opacity: 0; }
            100% { transform: translateY(0); opacity: 1; }
        }

        /* 3. Mstari wa dhahabu kuchora chini */
        @keyframes lineGrow {
            0% { width: 0%; opacity: 0; }
            50% { opacity: 1; }
            100% { width: 100%; opacity: 1; }
        }

        /* 4. Mwanga (Glow) wa logo ukishatua */
        @keyframes pulseGlow {
            0% { box-shadow: 0 0 0 0 rgba(243, 156, 18, 0.4); }
            70% { box-shadow: 0 0 0 30px rgba(243, 156, 18, 0); }
            100% { box-shadow: 0 0 0 0 rgba(243, 156, 18, 0); }
        }

        /* CLASSES ZINAZOTUMIA ANIMATIONS HIZO */
        .anim-logo {
            animation: logoReveal 1.5s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
            border-radius: 50%;
        }

        .anim-logo.glow {
            animation: pulseGlow 2s infinite;
        }

        .anim-text {
            opacity: 0; /* Inaanza ikiwa imejificha */
            animation: textReveal 1s cubic-bezier(0.2, 0.8, 0.2, 1) 1s forwards;
        }

        .gold-line {
            height: 4px;
            /* Rangi ya dhahabu na blue kulingana na logo */
            background: linear-gradient(90deg, transparent, #f39c12, #f1c40f, transparent);
            box-shadow: 0 0 15px #f39c12;
            border-radius: 50%;
            margin: 0 auto;
            width: 0;
            opacity: 0;
            animation: lineGrow 1.5s ease-in-out 1.8s forwards;
        }

        .anim-action {
            opacity: 0;
            animation: textReveal 1s cubic-bezier(0.2, 0.8, 0.2, 1) 2.5s forwards;
        }
    </style>
</head>
<body class="h-screen w-full flex items-center justify-center relative">

    <!-- Urembo wa background (Miwanga kwa mbali sana) -->
    <div class="absolute top-0 left-0 w-full h-full overflow-hidden -z-10 pointer-events-none">
        <div class="absolute top-[-10%] left-[-10%] w-96 h-96 bg-blue-50 rounded-full blur-3xl opacity-50"></div>
        <div class="absolute bottom-[-10%] right-[-10%] w-96 h-96 bg-yellow-50 rounded-full blur-3xl opacity-50"></div>
    </div>

    <div class="flex flex-col items-center justify-center w-full max-w-2xl px-6">
        
        <!-- 1. LOGO -->
        <div class="relative mb-6">
            <!-- Hakikisha faili lako la logo linaitwa logo.jpeg na liko folder moja na hii HTML -->
            <img src="logo.jpeg" alt="Zayoma Logo" class="anim-logo w-48 md:w-64 h-auto object-contain bg-white">
        </div>

        <!-- 2. MAANDISHI (Zayoma E-learning) -->
        <div class="anim-text text-center w-full">
            <h1 class="text-4xl md:text-5xl font-extrabold text-[#0a2342] tracking-tight">
                Zayoma <span class="text-transparent bg-clip-text bg-gradient-to-r from-[#f39c12] to-[#f1c40f] font-light">E-learning</span>
            </h1>
            <!-- Mstari wa Dhahabu chini ya jina -->
            <div class="mt-3 relative w-3/4 mx-auto">
                <div class="gold-line"></div>
            </div>
        </div>

        <!-- 3. KITUFE CHA KUINGIA NA LINK -->
        <div class="anim-action mt-12">
            <!-- =========================================================================
                 HAPA NDIPO UNAPOBADILISHA LINK YA KWENDA KWENYE FILE LAKO KUU
                 Badilisha "zayoma_fixed.html" na jina la file lako, mfano "zayoma.html"
                 ========================================================================= -->
            <a id="mainSystemLink" href="zayomas.html" class="group relative inline-flex items-center justify-center px-8 py-3.5 text-base font-bold text-white transition-all duration-300 bg-[#0a2342] border border-transparent rounded-full hover:bg-[#f39c12] hover:text-[#0a2342] hover:shadow-lg hover:shadow-yellow-500/30 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-[#0a2342]">
                <span>Nenda Kwenye Mfumo</span>
                <i class="fa-solid fa-arrow-right ml-3 transition-transform duration-300 group-hover:translate-x-1"></i>
            </a>
        </div>

        <!-- Ujumbe mdogo wa kusubiri -->
        <p class="anim-action text-xs text-gray-400 mt-4 animate-pulse">
            Inafungua mfumo kiotomatiki...
        </p>

    </div>

    <!-- SCRIPT YA AUTO-REDIRECT -->
    <script>
        // Kuongeza "Glow" effect kwenye logo baada ya animation ya mwanzo kuisha
        setTimeout(() => {
            const logo = document.querySelector('.anim-logo');
            if(logo) logo.classList.add('glow');
        }, 1500);

        // =========================================================================
        // Mfumo kujielekeza wenyewe (Auto Redirect) baada ya sekunde 5
        // =========================================================================
        setTimeout(() => {
            // Inachukua link uliyoiweka kwenye kitufe (a tag) hapo juu
            const redirectUrl = document.getElementById('mainSystemLink').getAttribute('href');
            
            // Inakupeleka kwenye ukurasa huo
            window.location.href = redirectUrl;
        }, 5000); // 5000 inamaanisha sekunde 5. Unaweza kubadilisha iwe 4000 (sekunde 4) nk.
    </script>
</body>
</html>
